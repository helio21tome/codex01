<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOT-STORE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #2a004a 0%, #4a0028 40%, #640101 70%, #2a004a 100%);
      background-attachment: fixed;
      position: relative;
      overflow-x: hidden;
      color: white;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 60%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
                  radial-gradient(circle at 70% 30%, rgba(168, 85, 247, 0.10) 0%, transparent 60%);
      pointer-events: none;
      opacity: 0.8;
      animation: cosmic-pulse 20s infinite alternate ease-in-out;
    }
    @keyframes cosmic-pulse {
      0%   { opacity: 0.7; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.03); }
    }
    .card-hover {
      transition: all 0.3s ease;
      border: 1px solid #2a1a3a;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }
    .card-hover:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 15px 35px rgba(236, 72, 153, 0.25);
      border-color: #ec4899;
    }
    .neon-title {
      text-shadow: 0 0 10px #c026d3, 0 0 20px #c026d3;
    }
    .filter-active {
      background: linear-gradient(135deg, #c026d3, #ec4899) !important;
      box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="flex items-center justify-between p-5 border-b border-purple-900/50 bg-black/60 backdrop-blur-md sticky top-0 z-50">
    <h1 class="text-3xl font-black neon-title tracking-wider text-pink-600">HOT-STORE</h1>
  </header>

  <!-- Search + Filters -->
  <section class="p-6 max-w-7xl mx-auto space-y-6">
    <div class="flex justify-center">
      <div class="relative w-full max-w-xl">
        <input id="search" type="text" placeholder="Search premium folders..." 
               class="w-full pl-12 pr-5 py-3 text-base rounded-full bg-zinc-900/80 border border-purple-800/50 text-white placeholder-zinc-500 outline-none focus:border-pink-600 transition-all duration-300" />
      </div>
    </div>

    <div class="flex flex-wrap items-center justify-between gap-4">
      <h1 id="page-info" class="text-3xl md:text-4xl font-extrabold neon-title text-white">Page 1 (1–12 of 21 folders)</h1>
      <p id="videos-found" class="text-lg text-zinc-400">21 folders found</p>
    </div>

    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div></div>
      <div class="flex flex-wrap items-center gap-3">
        <span class="text-sm text-zinc-400 font-medium">Sort by:</span>
        <button id="filterRecent"    class="px-5 py-2.5 rounded-full text-sm font-semibold bg-zinc-800 hover:bg-purple-900/50 filter-active">Recent</button>
        <button id="filterViews"     class="px-5 py-2.5 rounded-full text-sm font-semibold bg-zinc-800 hover:bg-purple-900/50">Views</button>
        <button id="filterPriceHigh" class="px-5 py-2.5 rounded-full text-sm font-semibold bg-zinc-800 hover:bg-purple-900/50">Price High</button>
        <button id="filterPriceLow"  class="px-5 py-2.5 rounded-full text-sm font-semibold bg-zinc-800 hover:bg-purple-900/50">Price Low</button>
      </div>
    </div>
  </section>

  <!-- Cards container -->
  <main id="card-container" class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 max-w-7xl mx-auto"></main>

  <!-- Pagination -->
  <div id="pagination" class="flex justify-center flex-wrap gap-3 py-8"></div>

  <script>
  document.addEventListener("DOMContentLoaded", () => {

    // ─── PRODUTOS ───────────────────────────────────────
    const produtos = [
      { title: "BLACK CP😊",               cover: "https://leopard.hosting.pecon.us/dl/qhihk",   price: 30 },
      { title: "CP PARADISE",              cover: "https://leopard.hosting.pecon.us/dl/sirul",   price: 30 },
      { title: "😈NEW CP 02🔥",            cover: "https://leopard.hosting.pecon.us/dl/qqcxz",   price: 30 },
      { title: "✅NEW CP 03🔥",            cover: "https://leopard.hosting.pecon.us/dl/asnac",   price: 30 },
      { title: "🥵PREMIUM CP🥵",           cover: "https://example.com/covers/023.jpg",         price: 30 },
      { title: "🔥REN BOYS",               cover: "https://example.com/covers/023.jpg",         price: 30 },
      { title: "🙈CP GAY",                 cover: "https://leopard.hosting.pecon.us/dl/vgjch",  price: 30 },
      { title: "ANIMAL CP FUCKING",        cover: "https://leopard.hosting.pecon.us/dl/gmdif",  price: 30 },
      { title: "🔥RAPE CP",                cover: "https://leopard.hosting.pecon.us/dl/vovoz",  price: 30 },
      { title: "PEDOMOM🍑",                cover: "https://leopard.hosting.pecon.us/dl/ekwob",  price: 30 },
      { title: "MON AND SON📁",            cover: "https://leopard.hosting.pecon.us/dl/yvnfh",  price: 30 },
      { title: "FATHER AND DAUGHTER",      cover: "https://leopard.hosting.pecon.us/dl/svrev",  price: 30 },
      { title: "AMELIA AND BROTHER🍑‼",    cover: "https://leopard.hosting.pecon.us/dl/zlydm",  price: 30 },
      { title: "🙈LIZZY AND BROTHER🍑",    cover: "https://leopard.hosting.pecon.us/dl/eusgu",  price: 30 },
      { title: "AMERICAN TEENS✅",          cover: "https://leopard.hosting.pecon.us/dl/jiusg",  price: 30 },
      { title: "ENGLISH TEENS🙈",          cover: "https://leopard.hosting.pecon.us/dl/qlviq",  price: 30 },
      { title: "WHITE TEENS",              cover: "https://leopard.hosting.pecon.us/dl/gtbph",  price: 30 },
      { title: "TEENS LEAKS📁‼",           cover: "https://leopard.hosting.pecon.us/dl/dfxog",  price: 30 },
      { title: "IVANKA AND BROTHER🤤",     cover: "https://leopard.hosting.pecon.us/dl/vzpjx",  price: 30 },
      { title: "HIGH SCHOOL SHOTS🫦🥵",    cover: "https://leopard.hosting.pecon.us/dl/napgs",  price: 30 },
      { title: "DESIRE GARCIA FOLDER📁",   cover: "https://leopard.hosting.pecon.us/dl/voyki",  price: 30 }
    ];

    const names = ["John","Luke","Carl","Hazael","Robert","Anna","Ian","Isabella","Mark","Steven","Satoshi","Yuna","David","Chloe","Liam","Emma","Kwame","Jade","Ahmed","Pablo","Michael","Camila","Hans","Greta","Peter","Sophie","Victor","Anya","Aisha","Tariq","Juan","Luisa","Chen","Mei","Arjun","Priya"];

    const folderNames = produtos.map(p => p.title);

    const PER_PAGE = 12;
    let currentPage = 1;
    let currentFilter = "recent";

    const cards = produtos.map((prod, i) => ({
      title: prod.title,
      time: `${10 + i % 10}s`,
      image: prod.cover || `https://via.placeholder.com/400x225?text=Cover+${i+1}`,
      label: i % 5 === 0 ? "HOT" : (i % 4 === 0 ? "NEW" : ""),
      views: Math.floor(Math.random() * 900) + 100,
      price: prod.price,
      createdAt: Date.now() - i * 1000000
    }));

    // Pegar elementos com segurança
    const elements = {
      container:     document.getElementById("card-container"),
      search:        document.getElementById("search"),
      filterRecent:  document.getElementById("filterRecent"),
      filterViews:   document.getElementById("filterViews"),
      filterPriceHigh: document.getElementById("filterPriceHigh"),
      filterPriceLow:  document.getElementById("filterPriceLow"),
      pagination:    document.getElementById("pagination"),
      pageInfo:      document.getElementById("page-info"),
      videosFound:   document.getElementById("videos-found")
    };

    // Se faltar elemento crítico → parar e mostrar aviso no console
    if (!elements.container) {
      console.error("Elemento #card-container não encontrado. Verifique o HTML.");
      return;
    }

    function getFilteredData() {
      let filtered = [...cards];
      if (elements.search?.value) {
        const kw = elements.search.value.toLowerCase().trim();
        filtered = filtered.filter(c => c.title.toLowerCase().includes(kw));
      }

      if (currentFilter === "priceHigh") filtered.sort((a,b)=>b.price - a.price);
      if (currentFilter === "priceLow")  filtered.sort((a,b)=>a.price - b.price);
      if (currentFilter === "views")     filtered.sort((a,b)=>b.views - a.views);
      if (currentFilter === "recent")    filtered.sort((a,b)=>b.createdAt - a.createdAt);

      return filtered;
    }

    function render() {
      const filtered = getFilteredData();
      const start = (currentPage - 1) * PER_PAGE;
      const paginated = filtered.slice(start, start + PER_PAGE);

      // Render cards
      elements.container.innerHTML = "";
      paginated.forEach((card, idx) => {
        const globalIdx = start + idx;
        const id = globalIdx + 1;
        elements.container.innerHTML += `
          <a href="video.html?id=${id}" class="block rounded-2xl overflow-hidden card-hover bg-zinc-900/40">
            <div class="relative">
              <img src="${card.image}" alt="${card.title}" class="w-full h-56 object-cover">
              ${card.label ? `<div class="absolute top-3 left-3 bg-pink-600/90 text-xs font-bold px-3 py-1 rounded-full">${card.label}</div>` : ""}
            </div>
            <div class="p-4">
              <h3 class="font-bold mb-2 line-clamp-2">${card.title}</h3>
              <div class="flex justify-between text-sm text-zinc-400 mb-2">
                <span>🕒 ${card.time}</span>
                <span>👁️ ${card.views.toLocaleString()}</span>
              </div>
              <div class="text-pink-500 font-semibold">${card.price}$</div>
            </div>
          </a>
        `;
      });

      // Pagination
      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      elements.pagination.innerHTML = "";
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        btn.className = `px-4 py-2 rounded-full text-sm ${i === currentPage ? 'bg-pink-600 text-white' : 'bg-zinc-800 hover:bg-zinc-700'}`;
        btn.onclick = () => { currentPage = i; render(); };
        elements.pagination.appendChild(btn);
      }

      // Info
      const from = start + 1;
      const to = Math.min(start + PER_PAGE, filtered.length);
      if (elements.pageInfo)   elements.pageInfo.textContent   = `Page ${currentPage} (${from}–${to} of ${filtered.length} folders)`;
      if (elements.videosFound) elements.videosFound.textContent = `${filtered.length} folders found`;

      // Active filter
      [elements.filterRecent, elements.filterViews, elements.filterPriceHigh, elements.filterPriceLow]
        .forEach(b => b?.classList.remove("filter-active"));
      if (currentFilter === "recent")    elements.filterRecent?.classList.add("filter-active");
      if (currentFilter === "views")     elements.filterViews?.classList.add("filter-active");
      if (currentFilter === "priceHigh") elements.filterPriceHigh?.classList.add("filter-active");
      if (currentFilter === "priceLow")  elements.filterPriceLow?.classList.add("filter-active");
    }

    // Eventos
    if (elements.search) {
      elements.search.addEventListener("input", () => { currentPage = 1; render(); });
    }

    if (elements.filterRecent)    elements.filterRecent.addEventListener("click",    () => { currentFilter = "recent";    currentPage = 1; render(); });
    if (elements.filterViews)     elements.filterViews.addEventListener("click",     () => { currentFilter = "views";     currentPage = 1; render(); });
    if (elements.filterPriceHigh) elements.filterPriceHigh.addEventListener("click", () => { currentFilter = "priceHigh"; currentPage = 1; render(); });
    if (elements.filterPriceLow)  elements.filterPriceLow.addEventListener("click",  () => { currentFilter = "priceLow";  currentPage = 1; render(); });

    // Primeira renderização
    render();

  });
  </script>
</body>
</html>
