      body {

        background-attachment: fixed;
        position: relative;
        overflow-x: hidden;
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 30% 60%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
                    radial-gradient(circle at 70% 30%, rgba(168, 85, 247, 0.10) 0%, transparent 60%);
        pointer-events: none;
        opacity: 0.8;
        animation: cosmic-pulse 20s infinite alternate ease-in-out;
      }
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        background: transparent;
        pointer-events: none;
        background-image: 
          radial-gradient(circle, rgba(255, 105, 180, 0.08) 1px, transparent 1px),
          radial-gradient(circle, rgba(186, 85, 211, 0.06) 1px, transparent 1px);
        background-size: 80px 80px, 120px 120px;
        background-position: 0 0, 40px 40px;
        opacity: 0.15;
        animation: float-stars 80s linear infinite;
      }
      @keyframes cosmic-pulse {
        0%   { opacity: 0.7; transform: scale(1); }
        100% { opacity: 1; transform: scale(1.03); }
      }
      @keyframes float-stars {
        0%   { background-position: 0 0, 40px 40px; }
        100% { background-position: 2000px 2000px, 2040px 2040px; }
      }
      .neon-title {
        text-shadow: 0 0 10px #c026d3, 0 0 20px #c026d3;
      }
      .zoom-hover {
        transition: all 0.4s ease;
        border: 1px solid #2a1a3a;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      }
      .zoom-hover:hover {
        transform: translateY(-8px) scale(1.04);
        box-shadow: 0 15px 35px rgba(236, 72, 153, 0.25);
        border-color: #ec4899;
      }
      #contact-seller {
